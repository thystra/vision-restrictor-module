name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing GitHub release tag to publish, for example v0.1.8"
        required: true
        type: string
      dry_run:
        description: "Validate with FoundryMods without saving"
        required: true
        default: true
        type: boolean
      discord_announce:
        description: "Ask FoundryMods to announce the release on Discord"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    name: Package and publish
    runs-on: ubuntu-latest

    steps:
      - name: Determine release inputs
        id: release_info
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "discord_announce=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
            echo "discord_announce=${{ inputs.discord_announce }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_info.outputs.tag }}
          fetch-depth: 0

      - name: Validate manifest JSON
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool module.json >/dev/null
          python3 - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path("module.json").read_text())
          assert m["id"] == "vision-restrictor-module", m["id"]
          assert m["compatibility"]["minimum"].startswith("14"), m["compatibility"]
          assert m["compatibility"]["verified"].startswith("14"), m["compatibility"]
          assert m.get("manifest", "").endswith("/releases/latest/download/module.json"), m.get("manifest")
          assert m.get("download", "").endswith("/releases/latest/download/vision-restrictor-module.zip"), m.get("download")
          PY

      - name: Install packaging tools
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/package.sh
          mkdir -p dist
          cp ../vision-restrictor-module.zip dist/vision-restrictor-module.zip
          cp module.json dist/module.json
          ls -lh dist

      - name: Upload GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_info.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            dist/module.json \
            dist/vision-restrictor-module.zip \
            --clobber
          # Give GitHub release assets a moment to become fetchable by FoundryMods.
          sleep 5

      - name: Publish to FoundryMods
        env:
          FOUNDRYMODS_TOKEN: ${{ secrets.FOUNDRYMODS_TOKEN }}
          RELEASE_TAG: ${{ steps.release_info.outputs.tag }}
          DRY_RUN: ${{ steps.release_info.outputs.dry_run }}
          DISCORD_ANNOUNCE: ${{ steps.release_info.outputs.discord_announce }}
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/module.json"
          PACKAGE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/vision-restrictor-module.zip"
          NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          CHANGELOG_FILE="dist/RELEASE_NOTES.md"

          cat > "$CHANGELOG_FILE" <<'NOTES'
          ${{ github.event.release.body }}
          NOTES

          scripts/publish-foundrymods.sh \
            --dry-run "$DRY_RUN" \
            --discord-announce "$DISCORD_ANNOUNCE" \
            --manifest-url "$MANIFEST_URL" \
            --package-url "$PACKAGE_URL" \
            --notes-url "$NOTES_URL" \
            --changelog-file "$CHANGELOG_FILE"
