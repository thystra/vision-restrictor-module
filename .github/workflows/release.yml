name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, e.g. v0.1.10. Leave blank to use the current ref."
        required: false
        default: ""
      dry_run:
        description: "Validate with FoundryMods without saving"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            DRY_RUN="false"
            NOTES_URL="${{ github.event.release.html_url }}"
          else
            TAG="${{ inputs.tag }}"
            if [[ -z "$TAG" ]]; then
              TAG="${GITHUB_REF_NAME}"
            fi
            DRY_RUN="${{ inputs.dry_run }}"
            NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "notes_url=$NOTES_URL" >> "$GITHUB_OUTPUT"

      - name: Check out tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Package module
        shell: bash
        run: |
          bash scripts/package.sh
          test -f dist/vision-restrictor-module.zip

      - name: Upload GitHub release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.vars.outputs.tag }}" \
            module.json \
            dist/vision-restrictor-module.zip#vision-restrictor-module.zip \
            --clobber

      - name: Publish to FoundryMods
        env:
          FOUNDRYMODS_TOKEN: ${{ secrets.FOUNDRYMODS_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          MANIFEST_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${TAG}/module.json"
          PACKAGE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/vision-restrictor-module.zip"

          scripts/publish-foundrymods.sh \
            --manifest-url "$MANIFEST_URL" \
            --package-url "$PACKAGE_URL" \
            --notes-url "${{ steps.vars.outputs.notes_url }}" \
            --dry-run "${{ steps.vars.outputs.dry_run }}"
